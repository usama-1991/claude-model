version: '3.8'

services:
  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoflow-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - n8n
    restart: unless-stopped
    networks:
      - autoflow-net

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autoflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - autoflow-net

  # ── n8n Automation ────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: autoflow-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change_this_key_32chars_min}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET:-change_this_jwt_secret}
      - DB_TYPE=sqlite
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - autoflow-net

  # ── Nginx Reverse Proxy (production) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: autoflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - production
    networks:
      - autoflow-net

networks:
  autoflow-net:
    driver: bridge

volumes:
  n8n_data:
    driver: local
